name: Test Scan and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fastapi_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd
          "pg_isready -U postgres -d fastapi_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: >-
        postgresql://postgres:postgres@localhost:5432/fastapi_test_db
      TEST_DATABASE_URL: >-
        postgresql://postgres:postgres@localhost:5432/fastapi_test_db

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=app \
            --cov=main \
            --cov-report=term-missing \
            --cov-fail-under=90

  build-scan-deploy:
    name: Build Scan and Deploy
    needs: test
    runs-on: ubuntu-latest

    # Do not deploy Docker images for pull requests.
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for security scan
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: module10-scan:${{ github.sha }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: module10-scan:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/is218-module10:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/is218-module10:${{ github.sha }}