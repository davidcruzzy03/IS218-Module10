services:
  web:
    build: .
    container_name: fastapi_calculator

    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fastapi_test_db

    depends_on:
      db:
        condition: service_healthy

    restart: on-failure

    networks:
      - app-network

  db:
    image: postgres:16
    container_name: postgres_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_test_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d fastapi_test_db"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    networks:
      - app-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  app-network: